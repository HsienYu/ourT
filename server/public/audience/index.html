<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ourT — 點歌</title>
<style>
  :root {
    --bg: #080808;
    --panel: #111;
    --border: #1e1e1e;
    --accent: #ffd0e0;
    --text: #ccc;
    --muted: #555;
    --ok: #44ffaa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }

  header {
    padding: 16px 18px 10px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }

  .search-bar {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  .search-bar input {
    width: 100%; background: #000; border: 1px solid var(--border);
    color: var(--text); font-family: monospace; font-size: 14px;
    padding: 9px 12px; outline: none; border-radius: 2px;
  }
  .search-bar input:focus { border-color: #333; }

  #song-list { padding: 8px 0; }

  .song-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.15s;
  }
  .song-item:active { background: #111; }

  .song-cover {
    width: 44px; height: 44px; object-fit: cover;
    background: #1a1a1a; border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 14px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-artist { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .song-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .tag { font-size: 9px; padding: 1px 5px; border: 1px solid var(--border); color: var(--muted); }

  .request-btn {
    flex-shrink: 0; padding: 8px 12px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: monospace; font-size: 10px;
    cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s;
  }
  .request-btn:active { border-color: var(--accent); color: var(--accent); }

  /* Confirmation toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #111; border: 1px solid var(--ok); color: var(--ok);
    font-family: monospace; font-size: 12px; letter-spacing: 1px;
    padding: 10px 20px; border-radius: 2px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap; max-width: 90vw;
    text-align: center; overflow: hidden; text-overflow: ellipsis;
  }
  #toast.show { opacity: 1; }

  /* Analyze button section — shown after successful request */
  #analyze-section {
    padding: 14px 16px; border-top: 1px solid var(--border);
    display: none;
  }
  #analyze-section.visible { display: block; }
  .analyze-song-label { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
  .analyze-btn {
    width: 100%; padding: 13px; background: transparent;
    border: 1px solid var(--accent); color: var(--accent);
    font-family: monospace; font-size: 12px; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
  }
  .analyze-btn:active { background: rgba(255,208,224,0.08); }

  .empty { padding: 30px 16px; text-align: center; font-size: 12px; color: var(--muted); letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <h1>點歌 / Song Request</h1>
</header>

<div class="search-bar">
  <input type="search" id="search-input" placeholder="搜尋歌曲或藝人⋯" oninput="filterSongs(this.value)">
</div>

<div id="song-list"></div>

<div id="analyze-section">
  <div class="analyze-song-label" id="analyze-label">上一首：—</div>
  <button class="analyze-btn" onclick="triggerAnalyze()">他點這首歌有什麼樣的傾向？</button>
</div>

<div id="toast"></div>

<script>
let catalog = [];
let lastRequestedItem = null;
let bus = null;

// ── Load catalog ──────────────────────────────────────────────────────────────
async function loadCatalog() {
  try {
    const res = await fetch('/api/songs');
    catalog = await res.json();
  } catch {
    catalog = [];
  }
  renderSongs(catalog);
}

function filterSongs(query) {
  const q = query.toLowerCase();
  const filtered = catalog.filter((s) =>
    s.title.toLowerCase().includes(q) ||
    s.artist.toLowerCase().includes(q) ||
    (s.tags || []).some((t) => t.toLowerCase().includes(q))
  );
  renderSongs(filtered);
}

function renderSongs(songs) {
  const el = document.getElementById('song-list');
  if (!songs.length) {
    el.innerHTML = '<div class="empty">找不到歌曲</div>';
    return;
  }
  el.innerHTML = songs.map((s) => `
    <div class="song-item" onclick="requestSong('${s.id}')">
      <img class="song-cover" src="/api/songs/${s.id}/cover" onerror="this.style.visibility='hidden'">
      <div class="song-info">
        <div class="song-title">${escHtml(s.title)}</div>
        <div class="song-artist">${escHtml(s.artist)}</div>
        <div class="song-tags">${(s.tags||[]).map((t)=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>
      </div>
      <button class="request-btn" onclick="event.stopPropagation();requestSong('${s.id}')">點歌</button>
    </div>
  `).join('');
}

async function requestSong(songId) {
  const res = await fetch('/api/queue/enqueue', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ songId, requesterLabel: '觀眾' }),
  });
  const json = await res.json();
  if (json.ok) {
    lastRequestedItem = json.item;
    showToast(`已加入：${json.item.song.title}`);
    showAnalyzeSection(json.item);
  } else {
    showToast(json.error || '點歌失敗');
  }
}

function showAnalyzeSection(item) {
  document.getElementById('analyze-label').textContent = `點了：${item.song.title} — ${item.song.artist}`;
  document.getElementById('analyze-section').classList.add('visible');
}

async function triggerAnalyze() {
  if (!lastRequestedItem) return;
  // Tell projection to show analysis via bus
  if (bus && bus.readyState === WebSocket.OPEN) {
    bus.send(JSON.stringify({ type: 'ktv.analyze', item: lastRequestedItem }));
    showToast('分析已送出，請看螢幕');
  } else {
    // Fallback: direct REST
    await fetch('/api/ktv/analyze-trigger', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item: lastRequestedItem }),
    });
    showToast('分析已送出，請看螢幕');
  }
}

// ── Bus connection (to receive queue updates) ─────────────────────────────────
function connectBus() {
  bus = new WebSocket(`ws://${location.host}/ws/bus?role=audience`);
  bus.onclose = () => setTimeout(connectBus, 4000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadCatalog();
connectBus();
</script>
</body>
</html>
